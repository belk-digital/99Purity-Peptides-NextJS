name: Automated Supabase Backup

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Allows you to trigger the backup manually from the Actions tab
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Database Dump
        env:
          # Your DATABASE_URI should be stored securely in GitHub Secrets
          DATABASE_URI: ${{ secrets.SUPABASE_DATABASE_URI }}
        run: |
          echo "Starting Supabase database backup..."
          
          # Create a backup filename with the current timestamp
          BACKUP_FILE="dump-postgres-$(date +'%Y%m%d%H%M').sql"
          
          # Run pg_dump using the connection string format
          # We use -n public to ensure ONLY the public schema (where Payload lives) is backed up.
          pg_dump "$DATABASE_URI" -n public -F p > $BACKUP_FILE
          
          # Check if the backup was successful
          if [ -s "$BACKUP_FILE" ]; then
            echo "Backup successful: $BACKUP_FILE"
            echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
          else
            echo "Backup failed or file is empty!"
            exit 1
          fi

      # Upload the dump as a GitHub Artifact
      - name: Upload Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-database-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          # Artifacts are kept for up to 90 days (you can adjust this)
          retention-days: 30
